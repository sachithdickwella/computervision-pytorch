name: pytorchdev
channels:
  - defaults
dependencies:
  - numpy
  - pandas
  - matplotlib
  - pillow
  - pip
  - plotly
  - scikit-learn
  - scikit-image
  - seaborn
  - python=3.14
  - ipykernel
  - pylint
  - xlrd
  - lxml
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu132
      - torch==2.12.1+cu132
      - torchvision==0.27.1+cu132
      - opencv-python
